<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 150" style="display:none;">
  <!-- 01. Robotic Line Installation - Robotic Arm -->
  <symbol id="logo-robotic" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="#0369A1" opacity="0.15" stroke="#0369A1" stroke-width="2"/>
    <g transform="translate(50, 50)">
      <!-- Base -->
      <rect x="-8" y="20" width="16" height="20" fill="#0369A1" rx="2"/>
      <!-- Arm segments -->
      <line x1="0" y1="20" x2="0" y2="-5" stroke="#0369A1" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="-5" r="4" fill="#0369A1"/>
      <line x1="0" y1="-5" x2="18" y2="-20" stroke="#0369A1" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="18" cy="-20" r="3.5" fill="#0369A1"/>
      <line x1="18" y1="-20" x2="28" y2="-15" stroke="#0369A1" stroke-width="2" stroke-linecap="round"/>
      <circle cx="28" cy="-15" r="3" fill="#0369A1"/>
      <!-- Gripper -->
      <line x1="28" y1="-15" x2="35" y2="-12" stroke="#0369A1" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="28" y1="-15" x2="35" y2="-18" stroke="#0369A1" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </symbol>

  <!-- 02. Conveyor Lines - Conveyor Belt -->
  <symbol id="logo-conveyor" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="#0369A1" opacity="0.15" stroke="#0369A1" stroke-width="2"/>
    <g transform="translate(50, 50)">
      <!-- Pulleys -->
      <circle cx="-20" cy="0" r="10" fill="none" stroke="#0369A1" stroke-width="2.5"/>
      <circle cx="20" cy="0" r="10" fill="none" stroke="#0369A1" stroke-width="2.5"/>
      <!-- Belt -->
      <path d="M -10 -8 Q 0 -15 10 -8" fill="none" stroke="#0369A1" stroke-width="3" stroke-linecap="round"/>
      <path d="M -10 8 Q 0 15 10 8" fill="none" stroke="#0369A1" stroke-width="3" stroke-linecap="round"/>
      <!-- Boxes on belt -->
      <rect x="-6" y="-10" width="5" height="5" fill="#0369A1" opacity="0.6"/>
      <rect x="2" y="-10" width="5" height="5" fill="#0369A1" opacity="0.4"/>
    </g>
  </symbol>

  <!-- 03. Control Cabinet - Control Panel -->
  <symbol id="logo-control" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="#0369A1" opacity="0.15" stroke="#0369A1" stroke-width="2"/>
    <g transform="translate(50, 50)">
      <!-- Cabinet -->
      <rect x="-15" y="-18" width="30" height="36" fill="none" stroke="#0369A1" stroke-width="2.5" rx="1"/>
      <!-- Circuits/Lines -->
      <line x1="-10" y1="-10" x2="10" y2="-10" stroke="#0369A1" stroke-width="1.5" opacity="0.7"/>
      <line x1="-10" y1="-2" x2="10" y2="-2" stroke="#0369A1" stroke-width="1.5" opacity="0.7"/>
      <line x1="-10" y1="6" x2="10" y2="6" stroke="#0369A1" stroke-width="1.5" opacity="0.7"/>
      <!-- Connectors -->
      <circle cx="-12" cy="-10" r="1.5" fill="#0369A1"/>
      <circle cx="12" cy="-10" r="1.5" fill="#0369A1"/>
      <circle cx="-12" cy="6" r="1.5" fill="#0369A1"/>
      <circle cx="12" cy="6" r="1.5" fill="#0369A1"/>
    </g>
  </symbol>

  <!-- 04. Battery Assembly - Battery Cell -->
  <symbol id="logo-battery" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="#0369A1" opacity="0.15" stroke="#0369A1" stroke-width="2"/>
    <g transform="translate(50, 50)">
      <!-- Battery shape -->
      <rect x="-12" y="-20" width="24" height="35" fill="none" stroke="#0369A1" stroke-width="2.5" rx="2"/>
      <!-- Terminal -->
      <rect x="-4" y="-22" width="8" height="3" fill="#0369A1"/>
      <!-- Charge levels -->
      <rect x="-8" y="-12" width="16" height="3" fill="#0369A1" opacity="0.9"/>
      <rect x="-8" y="-6" width="16" height="3" fill="#0369A1" opacity="0.7"/>
      <rect x="-8" y="0" width="16" height="3" fill="#0369A1" opacity="0.5"/>
      <rect x="-8" y="6" width="16" height="3" fill="#0369A1" opacity="0.3"/>
    </g>
  </symbol>

  <!-- 05. Power Plant - Lightning Bolt -->
  <symbol id="logo-power" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="#0369A1" opacity="0.15" stroke="#0369A1" stroke-width="2"/>
    <g transform="translate(50, 50)">
      <path d="M 0 -20 L 8 -5 L 0 -2 L 10 18 L -5 5 L -2 10 Z" fill="#0369A1" stroke="#0369A1" stroke-width="1" stroke-linejoin="round"/>
    </g>
  </symbol>

  <!-- 06. Process Solutions - Planet -->
  <symbol id="logo-planet" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="#0369A1" opacity="0.15" stroke="#0369A1" stroke-width="2"/>
    <g transform="translate(50, 50)">
      <!-- Planet sphere -->
      <circle cx="-2" cy="0" r="14" fill="none" stroke="#0369A1" stroke-width="2.5"/>
      <!-- Ring -->
      <ellipse cx="0" cy="0" rx="22" ry="6" fill="none" stroke="#0369A1" stroke-width="2"/>
      <!-- Highlights -->
      <circle cx="-8" cy="-5" r="2" fill="#0369A1" opacity="0.6"/>
    </g>
  </symbol>

  <!-- 07. Fire Protection - Fire Alarm -->
  <symbol id="logo-fire" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="#0369A1" opacity="0.15" stroke="#0369A1" stroke-width="2"/>
    <g transform="translate(50, 50)">
      <!-- Alarm box -->
      <rect x="-14" y="-14" width="28" height="28" fill="none" stroke="#0369A1" stroke-width="2.5" rx="2"/>
      <!-- Bell -->
      <circle cx="0" cy="0" r="6" fill="none" stroke="#0369A1" stroke-width="2"/>
      <path d="M -8 -8 Q -10 -12 -6 -14 M 8 -8 Q 10 -12 6 -14" fill="none" stroke="#0369A1" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Center indicator -->
      <circle cx="0" cy="0" r="2" fill="#0369A1"/>
    </g>
  </symbol>

  <!-- 08. Photovoltaic - Solar Panel -->
  <symbol id="logo-solar" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="#0369A1" opacity="0.15" stroke="#0369A1" stroke-width="2"/>
    <g transform="translate(50, 50)">
      <!-- Panel frame -->
      <rect x="-16" y="-12" width="32" height="24" fill="none" stroke="#0369A1" stroke-width="2" rx="1"/>
      <!-- Solar cells -->
      <rect x="-13" y="-9" width="6" height="6" fill="#0369A1" opacity="0.8"/>
      <rect x="-4" y="-9" width="6" height="6" fill="#0369A1" opacity="0.6"/>
      <rect x="5" y="-9" width="6" height="6" fill="#0369A1" opacity="0.4"/>
      <rect x="-13" y="0" width="6" height="6" fill="#0369A1" opacity="0.6"/>
      <rect x="-4" y="0" width="6" height="6" fill="#0369A1" opacity="0.4"/>
      <rect x="5" y="0" width="6" height="6" fill="#0369A1" opacity="0.2"/>
    </g>
  </symbol>

  <!-- 09. Welding - Welding Torch -->
  <symbol id="logo-welding" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="#0369A1" opacity="0.15" stroke="#0369A1" stroke-width="2"/>
    <g transform="translate(50, 50)">
      <!-- Handle -->
      <rect x="-8" y="5" width="16" height="18" fill="none" stroke="#0369A1" stroke-width="2.5" rx="2"/>
      <!-- Nozzle -->
      <path d="M -6 5 L -4 -8 L 4 -8 L 6 5" fill="none" stroke="#0369A1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Spark effect -->
      <circle cx="-10" cy="-10" r="1.5" fill="#0369A1" opacity="0.7"/>
      <circle cx="10" cy="-12" r="1.5" fill="#0369A1" opacity="0.7"/>
      <!-- Cables -->
      <line x1="-5" y1="23" x2="-10" y2="28" stroke="#0369A1" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="5" y1="23" x2="10" y2="28" stroke="#0369A1" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </symbol>
</svg>